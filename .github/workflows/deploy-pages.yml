name: Build and deploy docs site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log build and deployment snapshot
        run: echo "::notice title=Deployment snapshot::Building and deploying commit ${GITHUB_SHA}"

      - name: Reject stale snapshots
        shell: bash
        run: |
          current_main="$(git ls-remote --exit-code origin refs/heads/main | awk '{print $1}')"
          if [[ "$GITHUB_SHA" != "$current_main" ]]; then
            echo "::error title=Stale deployment snapshot::Refusing to deploy ${GITHUB_SHA}; current origin/main is ${current_main}. Start a fresh run on main."
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Verify set-topic corpus provenance
        run: node site/scripts/verify-corpus-provenance.mjs .

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install site dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Test, type-check, build, and verify internal links
        working-directory: site
        run: pnpm run build:verify

      - name: Verify corpus-derived Pagefind coverage
        working-directory: site
        run: pnpm run verify:search

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
